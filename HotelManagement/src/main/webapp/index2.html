<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <!-- Turret Road Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style >
    
* { box-sizing: border-box; padding: 0; margin: 0;}
ul { list-style: none; }
a { text-decoration: none; }
body { width: 100vw; max-width: 100%; height: 100vh; background: url(https://www.ohotelsindia.com/pune/images/5a0297bb5ad384ef8c29b3b67944d5d6.jpg) no-repeat center center/cover; overflow-x: hidden; }
header {
    position: relative;
    height: 4rem;
    width: 100vw;
    padding: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #111111;
}
    header h2 { color: #D6D6D6; font-size: 1.2rem; }
    header .logo { display: flex; align-items: center; padding: 1vh 1vw; font-family: 'Turret Road', sans-serif; }
    header .bars { 
        position: relative; 
        height: 3px; 
        width: 20px; 
        border-radius: 2px; 
        background-color: #888888; 
        margin-right: 10px; 
        display: none; 
    }

        header .bars.is-active { transform: rotate(90deg); width: 35px; transform-origin: right; transform: translateY(15px) rotate(45deg); }
        header .bars::after, header .bars::before { 
            position: absolute; 
            content: ''; 
            height: 3px; 
            left: 0; 
            width: 20px; 
            border-radius: 2px; 
            background: #888888;
            cursor: pointer; 
        }
            header .bars::after { bottom: 7px; }
            header .bars::before { top: 7px; }

.nav-links { display: flex; }
    .nav-links li { position: relative; padding: 0.7vw; margin: 0 0.7vw; }
        .nav-links li a { display: flex; flex-direction: column; align-items: center; color: #888888; }
            .nav-links li a span { font-size: .9rem; letter-spacing: 1px; margin-top: 0.2rem; }

section { display: flex; align-items: center; }
    section span { color: #888888; }
        section span i { margin: 0 1.2vw; font-size: 1.2rem; }
    section img { height: 3rem; width: 3rem; object-fit: cover; border-radius: 50%; margin: 0 0.7vw; }

@media only screen and (max-width: 768px) {
    header .logo { margin-right: 50px; }
    header .bars { display: block; transition: .5s; }
    nav { position: fixed; z-index: 3; }
    .nav-links { 
        background: white; 
        position: fixed; 
        top: 4rem; 
        left: 0; 
        padding-top: 1rem; 
        flex-direction: column; 
        height: 100vh; 
        width: 100%;
        pointer-events: none;
        transition: .5s;
        opacity: 0;
    }

        .nav-links li { margin: 1.5vw 0; }
        .nav-links.open { opacity: 1; pointer-events: all; }
}
    
    </style>
</head>
<body>
    <header>
        <div class="5 Star Hotel">
            <div class="bars"></div>
            <h2> Hotel</h2>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="#"><i class="fa-solid fa-house"></i><span>Home</span></a></li>
                <li><a href="roombooking.jsp"><i class="fa-solid fa-file-alt"></i><span>Rooms Booking</span></a></li>
                <li><a href="mpg.jsp"><i class="fa-solid fa-folder-open"></i><span>Conference & Meetings</span></a></li>
                <li><a href="#"><i class="fa-solid fa-comment-dots"></i><span>Dining</span></a></li>
                <li><a href="Login.jsp"><i class="fa-solid fa-map-marked-alt"></i><span>Login</span></a></li>
            </ul>
        </nav>

        <section>
            <span><i class="fa-solid fa-search"></i></span>
            <span><i class="fa-solid fa-bell"></i></span>
            <img src="https://api.blessingsonthenet.com/uploads/hotels/37a27f9c28d4d660d9221312c2376af5-1688827280168-O%20Hotel%20Pune%20Koregaon%20Park.jpg">
        </section>
    </header>

    <script src="main.js">
    const menu = document.querySelector('.bars');
    let menustate = false;
    menu.addEventListener('click', showMenu);
    function showMenu(){
        if(!menustate) {
            menu.classList.add('is-active');
            document.querySelector('.nav-links').classList.add('open');
            menustate = true;
        } else {
            menu.classList.remove('is-active');
            document.querySelector('.nav-links').classList.remove('open');
            menustate = false;
        }
    }
    </script>
</body>
</html>
